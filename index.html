<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>إدارة البناية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0a;--card:#161616;--border:#2a2a2a;--text:#f5f5f5;--muted:#888;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--gray:#6b7280;--blue:#60a5fa;--purple:#a78bfa;--orange:#fb923c}
html,body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;font-size:16px;min-height:100vh;overflow-x:hidden}
#app{max-width:600px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#111;border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{font-size:15px;font-weight:700}
.tabs{display:flex;overflow-x:auto;background:#111;border-bottom:1px solid var(--border);scrollbar-width:none;position:sticky;top:49px;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:9px 11px;font-size:12px;font-family:'Tajawal',sans-serif;cursor:pointer;border:none;background:#222;color:#ccc;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{background:transparent;color:#fff;border-bottom-color:#fff;font-weight:700}
.content{flex:1;padding:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.card-title{font-size:15px;font-weight:700;margin-bottom:10px}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px}
.label{color:var(--muted);font-size:14px}
.val{font-size:15px;font-weight:600}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:600}
.badge-green{background:#14532d;color:var(--green)}
.badge-red{background:#450a0a;color:var(--red)}
.badge-yellow{background:#451a03;color:var(--yellow)}
.badge-blue{background:#0c1a2e;color:var(--blue)}
.badge-gray{background:#1f2937;color:var(--gray)}
.bg{background:#0f0f0f;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 12px;border-radius:8px;border:none;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.btn-green{background:#166534;color:#fff}.btn-white{background:#fff;color:#000}
.btn-red{background:#7f1d1d;color:#fff}.btn-gray{background:#374151;color:#fff}
.btn-blue{background:#1e3a5f;color:#fff}.btn-orange{background:#92400e;color:#fff}
.btn-purple{background:#4c1d95;color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}.btn-xs{padding:3px 7px;font-size:11px;border-radius:6px}
.btn-full{width:100%;justify-content:center;margin-bottom:8px}
input,select,textarea{background:#0f0f0f;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:15px;padding:9px 11px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:#555}
textarea{resize:vertical;min-height:65px}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.stat-box{background:#0f0f0f;border:1px solid var(--border);border-radius:8px;padding:9px;text-align:center}
.stat-box .num{font-size:19px;font-weight:800}
.stat-box .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:600px;padding:20px;max-height:92vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.close-btn{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1}
.sec{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px}
.empty{text-align:center;color:var(--muted);padding:30px;font-size:14px}
.fw{display:flex;flex-wrap:wrap;gap:5px}
.cg{color:var(--green)}.cr{color:var(--red)}.cy{color:var(--yellow)}.cb{color:var(--blue)}.cm{color:var(--muted)}
.alert{border-radius:10px;padding:9px 12px;margin-bottom:9px;font-size:13px}
.alert-red{background:#2d0a0a;border:1px solid #7f1d1d;color:var(--red)}
.alert-yellow{background:#2d1f00;border:1px solid #92400e;color:var(--yellow)}
.alert-green{background:#052e16;border:1px solid #166534;color:var(--green)}
.alert-blue{background:#0d1f3c;border:1px solid #1e3a5f;color:var(--blue)}
.floor-hdr{font-size:11px;font-weight:700;color:var(--muted);padding:7px 3px 3px;text-transform:uppercase;letter-spacing:.5px;margin-top:5px}
select option{background:#161616}
.progress-bar{background:#222;border-radius:99px;height:7px;overflow:hidden;margin:4px 0}
.progress-fill{height:100%;border-radius:99px}
.month-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:10px}
.month-scroll::-webkit-scrollbar{display:none}
.mbtn{flex:0 0 auto;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap}
.mbtn.active{background:#fff;color:#000;border-color:#fff;font-weight:700}
.unit-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:4px}
.unit-btn{background:#0f0f0f;border:1px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;font-family:'Tajawal',sans-serif}
.unit-btn:active{opacity:.7}
.unit-btn .unum{font-size:14px;font-weight:800}
.unit-btn .ulbl{font-size:10px;color:var(--muted);margin-top:2px}
.unit-btn.occupied{border-color:#166534;background:#052e16}
.unit-btn.late{border-color:#7f1d1d;background:#2d0a0a}
.unit-btn.expiring{border-color:#92400e;background:#2d1f00}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{width:100%;max-width:340px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 20px;text-align:center}
.pin-dots{display:flex;gap:12px;justify-content:center;margin:14px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border)}
.pin-dot.filled{background:var(--text);border-color:var(--text)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.numpad-btn{background:#1a1a1a;border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:22px;font-weight:700;padding:14px;cursor:pointer}
.numpad-btn:active{background:#333}
</style>
</head>
<body>
<div id="app"><div style="color:#fff;padding:20px;font-family:Tajawal,sans-serif;direction:rtl;">⏳ جاري التحميل...</div></div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
// ══════════════════════════════════════════
//  FIREBASE
// ══════════════════════════════════════════
firebase.initializeApp({
  apiKey:"AIzaSyA87KJ4bi5Gd-ccU_VFuckmhl1Xq_j73F8",
  authDomain:"building-5ec84.firebaseapp.com",
  projectId:"building-5ec84",
  storageBucket:"building-5ec84.firebasestorage.app",
  messagingSenderId:"294424447302",
  appId:"1:294424447302:web:3a64271ad8440dfa167d47"
});
var db = firebase.firestore();

// ══════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════
const FLOORS = 8;
const UNITS_PER_FLOOR = 5;
const PIN = "1234"; // غيّر الرقم السري هنا
const CURRENCY = "ر.ع";
const MONTHS_AR = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
var S = {
  loggedIn: false,
  pin: "",
  tab: "home",
  modal: null,
  units: {},   // {id: unitData}
  hist: {},    // {unitId: [contracts]}
  mk: mkNow(), // current month key YYYY-MM
  selectedUnit: null,
};

function mkNow(){ const n=new Date(); return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0"); }
function fmt(n){ return Number(n||0).toLocaleString("ar-SA"); }
function fd(s){ if(!s) return "—"; const d=new Date(s); return isNaN(d)?"—":d.toLocaleDateString("ar-SA"); }
function today(){ return new Date().toISOString().split("T")[0]; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).substr(2,4); }

// Generate all unit IDs: 11,12...15, 21...85
function allUnitIds(){
  var ids=[];
  for(var f=1;f<=FLOORS;f++) for(var u=1;u<=UNITS_PER_FLOOR;u++) ids.push(f+""+u);
  return ids;
}

// ══════════════════════════════════════════
//  FIRESTORE
// ══════════════════════════════════════════
async function loadData(){
  try {
    // Load units
    const uSnap = await db.collection("units").get();
    uSnap.forEach(d=>{ S.units[d.id]=d.data(); });
    // Init missing units
    const allIds = allUnitIds();
    for(const id of allIds){
      if(!S.units[id]){ S.units[id]={id,status:"vacant",tenant:"",phone:"",rent:0,label:id,floor:parseInt(id[0]),unit:parseInt(id[1])}; }
    }
    // Load hist
    const hSnap = await db.collection("hist").get();
    hSnap.forEach(d=>{ S.hist[d.id]=d.data().contracts||[]; });
    render();
  } catch(e){
    console.error(e);
    // fallback local
    const allIds=allUnitIds();
    allIds.forEach(id=>{ if(!S.units[id]) S.units[id]={id,status:"vacant",tenant:"",phone:"",rent:0,label:id,floor:parseInt(id[0]),unit:parseInt(id[1])}; });
    render();
  }
}

async function saveUnit(u){
  S.units[u.id]=u;
  try{ await db.collection("units").doc(u.id).set(u); }catch(e){}
  render();
}

async function saveHist(unitId, contracts){
  S.hist[unitId]=contracts;
  try{ await db.collection("hist").doc(unitId).set({contracts}); }catch(e){}
  render();
}

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function getUnit(id){ return S.units[id]||{}; }
function getContracts(id){ return S.hist[id]||[]; }
function getActiveContract(id){
  const cs=getContracts(id);
  return cs.length?cs[cs.length-1]:null;
}
function unitStatusBadge(u){
  if(u.status==="vacant") return {cls:"badge-gray",lbl:"شاغر"};
  if(u.status==="late") return {cls:"badge-red",lbl:"متأخر"};
  if(u.status==="expiring") return {cls:"badge-yellow",lbl:"ينتهي قريباً"};
  return {cls:"badge-green",lbl:"مؤجر"};
}
function mkLabel(mk){ const [y,m]=mk.split("-"); return MONTHS_AR[parseInt(m)-1]+" "+y; }
function diffDays(dateStr){ return Math.ceil((new Date(dateStr)-new Date())/86400000); }

// Compute live statuses
function computeStatuses(){
  allUnitIds().forEach(id=>{
    const u=S.units[id]; if(!u||u.status==="vacant") return;
    const ct=getActiveContract(id);
    if(!ct) return;
    const diff=ct.end?diffDays(ct.end):999;
    if(diff<0) u.status="late"; // expired contract
    else if(diff<=30) u.status="expiring";
    else u.status="occupied";
    // check if current month rent paid
    const mk=S.mk;
    const paid=(ct.payments||[]).some(p=>p.mk===mk&&p.status==="paid");
    const dueDay=ct.dueDay||1;
    const [yr,mn]=mk.split("-");
    const dueDate=new Date(parseInt(yr),parseInt(mn)-1,dueDay);
    if(!paid&&new Date()>dueDate) u.status="late";
  });
}

// ══════════════════════════════════════════
//  RENDER ENGINE
// ══════════════════════════════════════════
function h(tag,props,...children){
  const el=document.createElement(tag);
  if(props) Object.entries(props).forEach(([k,v])=>{
    if(k==="className") el.className=v;
    else if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k.startsWith("on")&&typeof v==="function") el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="innerHTML") el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>{ if(c==null||c===false) return; el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c); });
  return el;
}

function set(patch){
  Object.assign(S,patch);
  render();
}

function render(){
  computeStatuses();
  const app=document.getElementById("app");
  app.innerHTML="";
  if(!S.loggedIn){ app.appendChild(rLogin()); return; }
  app.appendChild(rTopbar());
  app.appendChild(rTabs());
  const content=h("div",{className:"content"});
  content.appendChild(rPage());
  app.appendChild(content);
  if(S.modal) app.appendChild(rModal());
}

// ══════════════════════════════════════════
//  LOGIN
// ══════════════════════════════════════════
function rLogin(){
  const wrap=h("div",{className:"login-wrap"});
  const box=h("div",{className:"login-box"});
  box.appendChild(h("div",{style:{fontSize:"36px"}},"🏢"));
  box.appendChild(h("div",{style:{fontSize:"18px",fontWeight:"800",marginTop:"8px"}},"إدارة البناية"));
  box.appendChild(h("div",{style:{color:"var(--muted)",fontSize:"13px",marginTop:"4px"}},"أدخل رقم السر"));
  const dots=h("div",{className:"pin-dots"});
  for(let i=0;i<4;i++) dots.appendChild(h("div",{className:"pin-dot"+(S.pin.length>i?" filled":"")}));
  box.appendChild(dots);
  const err=h("div",{style:{color:"var(--red)",fontSize:"13px",minHeight:"18px",marginBottom:"4px"}},S.pinError||"");
  box.appendChild(err);
  const pad=h("div",{className:"numpad"});
  [1,2,3,4,5,6,7,8,9,"","0","⌫"].forEach(k=>{
    const btn=h("button",{className:"numpad-btn"+(k===""?" ":" "),onClick:()=>{
      if(k==="") return;
      if(k==="⌫"){ set({pin:S.pin.slice(0,-1),pinError:""}); return; }
      const np=S.pin+k;
      if(np.length<4){ set({pin:np,pinError:""}); return; }
      if(np===PIN){ set({pin:"",pinError:"",loggedIn:true}); }
      else { set({pin:"",pinError:"رقم السر غير صحيح"}); }
    }},k===""?"":String(k));
    pad.appendChild(btn);
  });
  box.appendChild(pad);
  wrap.appendChild(box);
  return wrap;
}

// ══════════════════════════════════════════
//  TOPBAR
// ══════════════════════════════════════════
function rTopbar(){
  const tabs=["home","building","contracts","payments","history","settings"];
  const titles={home:"🏠 الرئيسية",building:"🏗️ البناية",contracts:"📋 العقود",payments:"💰 الإيجارات",history:"📂 السجل",settings:"⚙️ الإعدادات"};
  return h("div",{className:"topbar"},
    h("div",{className:"topbar-title"},titles[S.tab]||"البناية"),
    h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}},
      h("div",{style:{fontSize:"12px",color:"var(--muted)"}},mkLabel(S.mk)),
      h("button",{className:"btn btn-green btn-xs",onClick:()=>set({modal:{type:"addContract"}})},"+عقد")
    )
  );
}

// ══════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════
function rTabs(){
  const tabList=[
    {id:"home",lbl:"🏠 الرئيسية"},
    {id:"building",lbl:"🏗️ البناية"},
    {id:"contracts",lbl:"📋 العقود"},
    {id:"payments",lbl:"💰 الإيجارات"},
    {id:"history",lbl:"📂 السجل"},
    {id:"settings",lbl:"⚙️ إعدادات"},
  ];
  const bar=h("div",{className:"tabs"});
  tabList.forEach(t=>{
    bar.appendChild(h("button",{className:"tab"+(S.tab===t.id?" active":""),onClick:()=>set({tab:t.id,modal:null})},t.lbl));
  });
  return bar;
}

// ══════════════════════════════════════════
//  PAGE ROUTER
// ══════════════════════════════════════════
function rPage(){
  if(S.tab==="home") return rHome();
  if(S.tab==="building") return rBuilding();
  if(S.tab==="contracts") return rContracts();
  if(S.tab==="payments") return rPayments();
  if(S.tab==="history") return rHistory();
  if(S.tab==="settings") return rSettings();
  return h("div",{className:"empty"},"قريباً");
}

// ══════════════════════════════════════════
//  HOME
// ══════════════════════════════════════════
function rHome(){
  const w=h("div",{});
  const units=Object.values(S.units);
  const occupied=units.filter(u=>u.status!=="vacant");
  const late=units.filter(u=>u.status==="late");
  const expiring=units.filter(u=>u.status==="expiring");
  const vacant=units.filter(u=>u.status==="vacant");
  const totalRent=occupied.reduce((s,u)=>s+(u.rent||0),0);

  // Month payments
  const paidUnits=occupied.filter(u=>{
    const ct=getActiveContract(u.id);
    return ct&&(ct.payments||[]).some(p=>p.mk===S.mk&&p.status==="paid");
  });
  const paidAmt=paidUnits.reduce((s,u)=>s+(u.rent||0),0);

  w.appendChild(h("div",{className:"card"},
    h("div",{className:"card-title"},`📅 ${mkLabel(S.mk)} — ملخص`),
    h("div",{className:"stat-grid"},
      h("div",{className:"stat-box"},h("div",{className:"num cg"},String(paidUnits.length)),h("div",{className:"lbl"},"دفع الإيجار")),
      h("div",{className:"stat-box"},h("div",{className:"num cb"},String(occupied.length)),h("div",{className:"lbl"},"مؤجر")),
      h("div",{className:"stat-box"},h("div",{className:"num"},fmt(paidAmt)),h("div",{className:"lbl"},`محصّل (${CURRENCY})`)),
      h("div",{className:"stat-box"},h("div",{className:"num",style:{color:"var(--muted)"}},String(vacant.length)),h("div",{className:"lbl"},"شاغر"))
    )
  ));

  if(late.length>0){
    const lc=h("div",{className:"card",style:{borderColor:"var(--red)"}});
    lc.appendChild(h("div",{className:"card-title cr"},`⚠️ متأخرون (${late.length})`));
    late.forEach(u=>lc.appendChild(h("div",{className:"row"},
      h("span",{style:{fontWeight:"700"}},u.label),
      h("span",{},u.tenant||"—"),
      h("span",{className:"cr"},fmt(u.rent)," "+CURRENCY)
    )));
    w.appendChild(lc);
  }

  if(expiring.length>0){
    const ec=h("div",{className:"card",style:{borderColor:"var(--orange)"}});
    ec.appendChild(h("div",{className:"card-title cy"},`📋 عقود تنتهي قريباً (${expiring.length})`));
    expiring.forEach(u=>{
      const ct=getActiveContract(u.id);
      const diff=ct&&ct.end?diffDays(ct.end):null;
      ec.appendChild(h("div",{className:"row"},
        h("span",{style:{fontWeight:"700"}},u.label),
        h("span",{},u.tenant||"—"),
        h("span",{className:"cy"},diff!=null?`بعد ${diff} يوم`:"—")
      ));
    });
    w.appendChild(ec);
  }

  // Summary bar
  const pct=Math.round(occupied.length/(FLOORS*UNITS_PER_FLOOR)*100);
  const bar=h("div",{className:"card"});
  bar.appendChild(h("div",{className:"row"},
    h("span",{className:"label"},"نسبة الإشغال"),
    h("span",{className:"val"},pct+"%")
  ));
  const pb=h("div",{className:"progress-bar"});
  pb.appendChild(h("div",{className:"progress-fill",style:{width:pct+"%",background:"var(--green)"}}));
  bar.appendChild(pb);
  bar.appendChild(h("div",{className:"row",style:{marginTop:"8px"}},
    h("span",{className:"label"},"إجمالي الإيجار الشهري"),
    h("span",{className:"val cg"},fmt(totalRent)+" "+CURRENCY)
  ));
  bar.appendChild(h("div",{className:"row"},
    h("span",{className:"label"},"المحصّل هذا الشهر"),
    h("span",{className:"val cg"},fmt(paidAmt)+" "+CURRENCY)
  ));
  bar.appendChild(h("div",{className:"row"},
    h("span",{className:"label"},"المتبقي"),
    h("span",{className:"val cr"},fmt(totalRent-paidAmt)+" "+CURRENCY)
  ));
  w.appendChild(bar);

  return w;
}

// ══════════════════════════════════════════
//  BUILDING
// ══════════════════════════════════════════
function rBuilding(){
  const w=h("div",{});
  for(let f=FLOORS;f>=1;f--){
    const units=[];
    for(let u=1;u<=UNITS_PER_FLOOR;u++) units.push(f+""+u);
    const occ=units.filter(id=>S.units[id]&&S.units[id].status!=="vacant").length;
    w.appendChild(h("div",{className:"floor-hdr"},`الدور ${f} — ${occ}/${UNITS_PER_FLOOR} مؤجر`));
    const grid=h("div",{className:"unit-grid"});
    units.forEach(id=>{
      const u=S.units[id]||{};
      const cls=u.status==="late"?"late":u.status==="expiring"?"expiring":u.status!=="vacant"?"occupied":"";
      const btn=h("div",{className:"unit-btn "+cls,onClick:()=>set({modal:{type:"unitDetail",uid:id}})},
        h("div",{className:"unum"},id),
        h("div",{className:"ulbl"},u.status==="vacant"?"شاغر":u.status==="late"?"متأخر":u.status==="expiring"?"ينتهي":"مؤجر")
      );
      grid.appendChild(btn);
    });
    w.appendChild(grid);
  }
  return w;
}

    filtered.sort((a,b)=>a.id.localeCompare(b.id)).forEach(u=>{

        ));
        card.appendChild(h("div",{className:"row"},

        ));

// ══════════════════════════════════════════
//  PAYMENTS
// ══════════════════════════════════════════
function rPayments(){
  const w=h("div",{});

  // Month selector
  const ms=h("div",{className:"month-scroll"});
  const now=new Date();
  for(let i=-3;i<=3;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    const mk=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    const btn=h("button",{className:"mbtn"+(S.mk===mk?" active":""),onClick:()=>set({mk})},mkLabel(mk));
    ms.appendChild(btn);
  }
  w.appendChild(ms);

  const units=Object.values(S.units).filter(u=>u.status!=="vacant");
  const paid=[],unpaid=[];
  units.forEach(u=>{
    const ct=getActiveContract(u.id);
    const p=ct&&(ct.payments||[]).find(p=>p.mk===S.mk&&p.status==="paid");
    if(p) paid.push({u,p}); else unpaid.push(u);
  });

  const paidAmt=paid.reduce((s,{u})=>s+(u.rent||0),0);
  const unpaidAmt=unpaid.reduce((s,u)=>s+(u.rent||0),0);

  w.appendChild(h("div",{className:"stat-grid"},
    h("div",{className:"stat-box"},h("div",{className:"num cg"},String(paid.length)),h("div",{className:"lbl"},"دفع")),
    h("div",{className:"stat-box"},h("div",{className:"num cr"},String(unpaid.length)),h("div",{className:"lbl"},"لم يدفع")),
    h("div",{className:"stat-box"},h("div",{className:"num cg"},fmt(paidAmt)),h("div",{className:"lbl"},CURRENCY+" محصّل")),
    h("div",{className:"stat-box"},h("div",{className:"num cr"},fmt(unpaidAmt)),h("div",{className:"lbl"},CURRENCY+" متبقي"))
  ));

  if(unpaid.length){
    w.appendChild(h("div",{className:"sec"},`لم يدفعوا (${unpaid.length})`));
    unpaid.forEach(u=>{
      const row=h("div",{className:"bg row"});
      row.appendChild(h("div",{},
        h("div",{style:{fontWeight:"700"}},u.label),
        h("div",{style:{fontSize:"12px",color:"var(--muted)"}},u.tenant||"—")
      ));
      row.appendChild(h("div",{style:{textAlign:"left"}},
        h("div",{className:"cy",style:{fontSize:"13px"}},fmt(u.rent)+" "+CURRENCY),
        h("button",{className:"btn btn-green btn-xs",style:{marginTop:"4px"},onClick:()=>set({modal:{type:"addPayment",uid:u.id}})},
          "💰 تحصيل"
        )
      ));
      w.appendChild(row);
    });
  }

  if(paid.length){
    w.appendChild(h("div",{className:"sec"},`دفعوا (${paid.length})`));
    paid.forEach(({u,p})=>{
      const row=h("div",{className:"bg row"});
      row.appendChild(h("div",{},
        h("div",{style:{fontWeight:"700"}},u.label),
        h("div",{style:{fontSize:"12px",color:"var(--muted)"}},u.tenant||"—")
      ));
      row.appendChild(h("div",{style:{textAlign:"left"}},
        h("div",{className:"cg",style:{fontSize:"13px"}},fmt(p.amount)+" "+CURRENCY),
        h("div",{style:{fontSize:"11px",color:"var(--muted)"}},fd(p.date)),
        h("button",{className:"btn btn-gray btn-xs",style:{marginTop:"4px"},onClick:async()=>{
          if(!confirm("إلغاء الدفعة؟")) return;
          const ct=getActiveContract(u.id);
          if(!ct) return;
          ct.payments=(ct.payments||[]).filter(x=>!(x.mk===S.mk&&x.status==="paid"));
          await saveHist(u.id,getContracts(u.id));
        }},"↩ إلغاء")
      ));
      w.appendChild(row);
    });
  }

  return w;
}

function rModal(){
  const m=S.modal;
  const overlay=h("div",{className:"modal-overlay",onClick:e=>{ if(e.target===overlay) set({modal:null}); }});
  const box=h("div",{className:"modal"});
  overlay.appendChild(box);

  if(m.type==="unitDetail") buildUnitDetail(box,m.uid);
  else if(m.type==="addContract"||m.type==="editContract") buildContractForm(box,m);
  else if(m.type==="addPayment") buildPaymentForm(box,m.uid);
  else if(m.type==="renewContract") buildRenewForm(box,m.uid);
  else if(m.type==="firebaseConfig") buildFirebaseConfig(box);

  return overlay;
}

  const fEnd=h("input",{type:"date",value:ct?ct.end:""});

  [

  ].forEach(([lbl,el])=>{

      ...(S.units[finalUid]||{}),

  const fKey=h("input",{type:"text",placeholder:"API Key"});
  const fProject=h("input",{type:"text",placeholder:"Project ID"});
  const fApp=h("input",{type:"text",placeholder:"App ID"});
  [["API Key",fKey],["Project ID",fProject],["App ID",fApp]].forEach(([lbl,el])=>{
    box.appendChild(h("div",{className:"field"},h("label",{},lbl),el));
  });
  box.appendChild(h("button",{className:"btn btn-blue btn-full",onClick:()=>{
    if(!fKey.value||!fProject.value){ alert("يرجى إدخال API Key و Project ID"); return; }
    const cfg={apiKey:fKey.value,projectId:fProject.value,appId:fApp.value,authDomain:fProject.value+".firebaseapp.com",storageBucket:fProject.value+".firebasestorage.app",messagingSenderId:"000000000000"};
    localStorage.setItem("fbConfig",JSON.stringify(cfg));
    alert("✅ تم الحفظ. ستتم إعادة التحميل.");
    location.reload();
  }},"💾 حفظ وإعادة الاتصال"));
}

//  INIT
// ══════════════════════════════════════════
loadData();
</script>
