<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0a;--card:#161616;--border:#2a2a2a;--text:#f5f5f5;--muted:#888;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--blue:#60a5fa}
html,body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh}
#app{max-width:600px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#111;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{font-size:16px;font-weight:800}
.tabs{display:flex;overflow-x:auto;background:#111;border-bottom:1px solid var(--border);scrollbar-width:none;position:sticky;top:49px;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;padding:10px 6px;font-size:13px;font-family:'Tajawal',sans-serif;cursor:pointer;border:none;background:transparent;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;text-align:center}
.tab.active{color:#fff;border-bottom-color:#fff;font-weight:700}
.content{flex:1;padding:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.lbl{color:var(--muted);font-size:14px}
.val{font-size:15px;font-weight:700}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
.bg-green{background:#14532d;color:var(--green)}
.bg-red{background:#450a0a;color:var(--red)}
.bg-yellow{background:#451a03;color:var(--yellow)}
.bg-gray{background:#1f2937;color:var(--muted)}
.bg-blue{background:#0c1a2e;color:var(--blue)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 14px;border-radius:8px;border:none;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px}
.btn-green{background:#166534;color:#fff}
.btn-red{background:#7f1d1d;color:#fff}
.btn-gray{background:#374151;color:#fff}
.btn-sm{padding:5px 12px;font-size:13px;width:auto;margin-bottom:0}
input,select{background:#0f0f0f;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:15px;padding:10px 12px;width:100%;outline:none;margin-bottom:10px}
input:focus,select:focus{border-color:#555}
.field-lbl{font-size:12px;color:var(--muted);margin-bottom:4px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-box{background:#0f0f0f;border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-box .num{font-size:22px;font-weight:800}
.stat-box .lbl2{font-size:11px;color:var(--muted);margin-top:3px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px 18px 0 0;width:100%;max-width:600px;padding:20px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.close-btn{background:none;border:none;color:var(--muted);font-size:26px;cursor:pointer;line-height:1}
.empty{text-align:center;color:var(--muted);padding:40px;font-size:15px}
.unit-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:6px}
.unit-btn{background:#0f0f0f;border:1px solid var(--border);border-radius:8px;padding:10px 4px;text-align:center;cursor:pointer}
.unit-btn .unum{font-size:15px;font-weight:800}
.unit-btn .ulbl{font-size:10px;color:var(--muted);margin-top:3px}
.unit-btn.office{border-color:#4c1d95;background:#1e1040}

.unit-btn.late{border-color:#7f1d1d;background:#2d0a0a}
.unit-btn.expiring{border-color:#92400e;background:#2d1f00}
.floor-hdr{font-size:11px;font-weight:700;color:var(--muted);padding:8px 2px 4px;letter-spacing:.5px}
.alert{border-radius:10px;padding:10px 13px;margin-bottom:10px;font-size:13px;line-height:1.5}
.alert-red{background:#2d0a0a;border:1px solid #7f1d1d;color:var(--red)}
.alert-yellow{background:#2d1f00;border:1px solid #92400e;color:var(--yellow)}
.alert-green{background:#052e16;border:1px solid #166534;color:var(--green)}
.month-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:12px}
.month-scroll::-webkit-scrollbar{display:none}
.mbtn{flex:0 0 auto;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer}
.mbtn.active{background:#fff;color:#000;border-color:#fff;font-weight:700}
select option{background:#161616}

function mkNow(){var n=new Date();return n.getFullYear()+"-"+pad(n.getMonth()+1);}
function pad(n){return String(n).padStart(2,"0");}
function fmt(n){return Number(n||0).toLocaleString();}

async function saveUnit(u){S.units[u.id]=u;try{await db.collection("units").doc(u.id).set(u);}catch(e){}render();}
async function saveHist(id,cs){S.hist[id]=cs;try{await db.collection("hist").doc(id).set({contracts:cs});}catch(e){}render();}

// ─── HELPERS ───
function getUnit(id){return S.units[id]||{id,status:"vacant",tenant:"",rent:0};}
function getContracts(id){return S.hist[id]||[];}
function getActive(id){var cs=getContracts(id);return cs.length?cs[cs.length-1]:null;}
function computeStatus(u){
  if(u.status==="vacant")return"vacant";
  if(u.id==="25"||u.tenant==="مكتب البناية")return"office";
  var ct=getActive(u.id);
  if(!ct)return"vacant";
  var diff=ct.end?diffDays(ct.end):999;
  // check payment
  var paid=(ct.payments||[]).some(p=>p.mk===S.mk&&p.status==="paid");
  var dueDay=ct.dueDay||1,mkArr=S.mk.split("-");
  var due=new Date(parseInt(mkArr[0]),parseInt(mkArr[1])-1,dueDay);
  var graceDue=new Date(due); graceDue.setDate(graceDue.getDate()+7); // 7 أيام سماح
  if(!paid&&new Date()>graceDue)return"late";
  if(diff<0)return"late";
  if(diff<=30)return"expiring";
  return"occupied";
}

// ─── RENDER ───
function h(tag,props){
  var el=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==="cls")el.className=v;
    else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k[0]==="o"&&k[1]==="n")el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="html")el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  for(var i=2;i<arguments.length;i++){
    var c=arguments[i];
    if(c==null)continue;
    if(Array.isArray(c)){c.forEach(x=>{if(x!=null)el.appendChild(typeof x==="string"?document.createTextNode(x):x);});}
    else el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  }
  return el;
}
function set(p){Object.assign(S,p);render();}

function render(){
  var app=document.getElementById("app");
  app.innerHTML="";
  app.appendChild(rTopbar());
  app.appendChild(rTabs());
  var c=h("div",{cls:"content"});
  c.appendChild(rPage());
  app.appendChild(c);
  if(S.modal)app.appendChild(rModal());
}

function rTopbar(){
  return h("div",{cls:"topbar"},

}

function rTabs(){

  return bar;
}

function rPage(){
  if(S.tab==="home")return rHome();

  if(S.tab==="payments")return rPayments();
  if(S.tab==="report")return rReport();

// ─── HOME ───
function rHome(){
  var w=h("div",{});
  var units=Object.values(S.units);
  var occ=units.filter(u=>computeStatus(u)!=="vacant");
  var late=units.filter(u=>computeStatus(u)==="late");
  var exp=units.filter(u=>computeStatus(u)==="expiring");
  var paid=occ.filter(u=>{var ct=getActive(u.id);return ct&&(ct.payments||[]).some(p=>p.mk===S.mk&&p.status==="paid");});
  var paidAmt=paid.reduce((s,u)=>s+(u.rent||0),0);
  var totalRent=occ.reduce((s,u)=>s+(u.rent||0),0);

  w.appendChild(h("div",{cls:"card"},
    h("div",{style:{fontWeight:"800",fontSize:"15px",marginBottom:"12px"}},mkLabel(S.mk)+" — ملخص"),
    h("div",{cls:"stat-grid"},
      h("div",{cls:"stat-box"},h("div",{cls:"num",style:{color:"var(--green)"}},String(occ.length)),h("div",{cls:"lbl2"},"مؤجر")),
      h("div",{cls:"stat-box"},h("div",{cls:"num",style:{color:"var(--muted)"}},String(FLOORS*UPF+9-occ.length)),h("div",{cls:"lbl2"},"شاغر")),
      h("div",{cls:"stat-box"},h("div",{cls:"num",style:{color:"var(--green)"}},fmt(paidAmt)),h("div",{cls:"lbl2"},"محصّل "+CUR)),
      h("div",{cls:"stat-box"},h("div",{cls:"num",style:{color:"var(--red)"}},fmt(totalRent-paidAmt)),h("div",{cls:"lbl2"},"متبقي "+CUR))
    )
  ));

  if(late.length)w.appendChild(h("div",{cls:"alert alert-red"},`⚠️ ${late.length} شقة متأخرة في الإيجار`));
  if(exp.length)w.appendChild(h("div",{cls:"alert alert-yellow"},`📋 ${exp.length} عقد ينتهي خلال 30 يوم`));
  if(!late.length&&!exp.length)w.appendChild(h("div",{cls:"alert alert-green"},"✅ لا توجد تنبيهات"));

  // العقود المنتهية وقاربت على الانتهاء
  var allOcc=units.filter(function(u){return u.status!=="vacant"&&u.tenant!=="مكتب البناية"&&u.id!=="25";});
  var expiringList=[];
  allOcc.forEach(function(u){
    var ct=getActive(u.id);
    if(!ct||!ct.end) return;
    var diff=diffDays(ct.end);
    if(diff<=60) expiringList.push({u,ct,diff});
  });
  expiringList.sort(function(a,b){return a.diff-b.diff;});

  if(expiringList.length){
    var sec=h("div",{cls:"card",style:{borderColor:"var(--orange)"}});
    sec.appendChild(h("div",{style:{fontWeight:"800",fontSize:"14px",marginBottom:"10px",color:"var(--orange)"}},"📋 عقود منتهية أو تنتهي قريباً ("+expiringList.length+")"));
    expiringList.forEach(function(item){
      var color=item.diff<0?"var(--red)":item.diff<=30?"var(--yellow)":"var(--orange)";
      var label=item.diff<0?"منتهي منذ "+Math.abs(item.diff)+" يوم":"ينتهي خلال "+item.diff+" يوم";
      var row=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid var(--border)"}});
      row.appendChild(h("div",{},
        h("div",{style:{fontWeight:"800",fontSize:"13px"}},(item.u.id.startsWith("م")?"محل ":"شقة ")+item.u.id),
        h("div",{style:{color:"var(--muted)",fontSize:"12px"}},item.u.tenant)
      ));
      row.appendChild(h("div",{style:{textAlign:"left"}},
        h("div",{style:{color:color,fontSize:"12px",fontWeight:"700"}},label),
        h("div",{style:{color:"var(--muted)",fontSize:"11px"}},fd(item.ct.end))
      ));
      sec.appendChild(row);
    });
    w.appendChild(sec);
  }

  // زر تحميل البيانات إذا لا يوجد مستأجرون
  if(!occ.length) w.appendChild(h("button",{cls:"btn btn-gray",style:{marginTop:"10px"},onClick:async()=>{
    if(!confirm("تحميل بيانات البناية الكاملة؟"))return;

  }},"📥 تحميل بيانات البناية"));

  return w;
}

// ─── BUILDING ───
function rBuilding(){
  var w=h("div",{});
  // Floors
  for(var f=FLOORS;f>=1;f--){
    (function(floor){
      var ids=[];for(var u=1;u<=UPF;u++)ids.push(floor+""+u);
      var occ=ids.filter(function(id){return computeStatus(S.units[id]||{})!=="vacant";}).length;
      w.appendChild(h("div",{cls:"floor-hdr"},"الدور "+floor+" — "+occ+"/"+UPF));
      var grid=h("div",{cls:"unit-grid"});
      ids.forEach(function(id){
        var u=getUnit(id);var st=computeStatus(u);
        var cls=st==="late"?"late":st==="expiring"?"expiring":st==="office"?"office":st!=="vacant"?"occupied":"";
        var lbl=st==="late"?"متأخر":st==="expiring"?"ينتهي":st==="office"?"مكتب":st!=="vacant"?"مؤجر":"شاغر";
        grid.appendChild(h("div",{cls:"unit-btn "+cls,onClick:(function(i){return function(){set({modal:{type:"unit",uid:i}});}})(id)},
          h("div",{cls:"unum"},id),
          h("div",{cls:"ulbl"},lbl)
        ));
      });
      w.appendChild(grid);
    })(f);
  }
  // Shops
  var shopIds=[];for(var s=1;s<=9;s++)shopIds.push("م"+s);
  var shopOcc=shopIds.filter(function(id){return computeStatus(S.units[id]||{})!=="vacant";}).length;
  w.appendChild(h("div",{cls:"floor-hdr"},"المحلات التجارية — "+shopOcc+"/9"));
  var sg=h("div",{cls:"unit-grid"});
  shopIds.forEach(function(id){
    var u=getUnit(id);var st=computeStatus(u);
    var cls=st==="late"?"late":st==="expiring"?"expiring":st!=="vacant"?"occupied":"";
    var lbl=st==="late"?"متأخر":st==="expiring"?"ينتهي":st!=="vacant"?"مؤجر":"شاغر";
    sg.appendChild(h("div",{cls:"unit-btn "+cls,onClick:(function(i){return function(){set({modal:{type:"unit",uid:i}});}})(id)},
      h("div",{cls:"unum"},id),
      h("div",{cls:"ulbl"},lbl)
    ));
  });
  w.appendChild(sg);
  return w;
}

function rPayments(){
  var w=h("div",{});
  // month nav
  var ms=h("div",{cls:"month-scroll"});
  var now=new Date();
  for(var i=-3;i<=3;i++){
    var d=new Date(now.getFullYear(),now.getMonth()+i,1);
    var mk=d.getFullYear()+"-"+pad(d.getMonth()+1);
    ms.appendChild(h("button",{cls:"mbtn"+(S.mk===mk?" active":""),onClick:(m=>()=>set({mk:m}))(mk)},mkLabel(mk)));
  }
  w.appendChild(ms);

  var occ=Object.values(S.units).filter(u=>u.status!=="vacant"&&u.tenant!=="مكتب البناية");
  var paid=[],unpaid=[];
  occ.forEach(u=>{
    var ct=getActive(u.id);
    var p=ct&&(ct.payments||[]).find(p=>p.mk===S.mk&&p.status==="paid");
    if(p)paid.push({u,p});else unpaid.push(u);

  if(unpaid.length){
    w.appendChild(h("div",{style:{fontWeight:"700",color:"var(--red)",fontSize:"14px",marginBottom:"8px"}},"لم يدفع ("+unpaid.length+")"));

      row.appendChild(h("div",{},
        h("div",{style:{fontWeight:"800",fontSize:"15px"}},"شقة "+u.id),
        h("div",{style:{color:"var(--muted)",fontSize:"13px",marginTop:"2px"}},u.tenant||"—")
      ));
      row.appendChild(h("div",{style:{textAlign:"left"}},

          h("div",{style:{color:"var(--muted)",fontSize:"13px",marginTop:"2px"}},u.tenant||"—")
        ),
        h("div",{style:{textAlign:"left"}},
          h("div",{style:{color:"var(--green)",fontWeight:"700"}},fmt(p.amount)+" "+CUR),
          h("div",{style:{fontSize:"11px",color:"var(--muted)"}},fd(p.date))
        )
      ));
      row.appendChild(h("div",{style:{display:"flex",gap:"6px",marginTop:"8px"}},
        h("button",{cls:"btn btn-gray btn-sm",onClick:(function(uid,pmt){return function(){set({modal:{type:"editPayment",uid:uid,pmt:pmt}});};})(u.id,p)},"✏️ تعديل"),
        h("button",{cls:"btn btn-red btn-sm",onClick:(function(uid,pmt){return function(){
          if(!confirm("إلغاء دفعة "+fmt(pmt.amount)+" "+CUR+"؟"))return;

          cs[cs.length-1].payments=(cs[cs.length-1].payments||[]).filter(function(x){return x.id!==pmt.id;});
          saveHist(uid,cs);
        };})(u.id,p)},"↩ إلغاء")
      ));
      w.appendChild(row);
    });
  }

  if(!occ.length)w.appendChild(h("div",{cls:"empty"},"لا توجد شقق مؤجرة"));

  w.appendChild(h("button",{cls:"btn btn-gray",style:{marginTop:"12px"},onClick:function(){

      table{width:100%;border-collapse:collapse;margin-bottom:20px}
      th{background:#1a1a1a;color:#fff;padding:8px;font-size:12px;text-align:right}
      td{border:1px solid #e0e0e0;padding:7px 9px}
      tfoot td{font-weight:800;background:#f5f5f5}
      @media print{button{display:none!important}}
    </style></head><body>
    <h2>🏢 تقرير إيجارات ${mkLabel(S.mk)}</h2>
    <h3>تاريخ الطباعة: ${fd(today())}</h3>
    <div class='summary'>
      <div class='sum-box'><div class='n' style='color:green'>${fmt(aptsPaidAmt+shopsPaidAmt)} ${CUR}</div><div class='l'>إجمالي المحصّل</div></div>

    <tbody>${aptsRows}</tbody>
    <tfoot><tr><td colspan='2'>الإجمالي</td><td>${fmt(aptsTotal)}</td><td style='color:green'>${fmt(aptsPaidAmt)} ${CUR}</td><td></td></tr></tfoot></table>

// ─── MODALS ───
function rModal(){
  var m=S.modal;
  var ov=h("div",{cls:"modal-overlay",onClick:e=>{if(e.target===ov)set({modal:null});}});
  var box=h("div",{cls:"modal"});
  ov.appendChild(box);
  if(m.type==="unit")buildUnit(box,m.uid);
  else if(m.type==="addContract"||m.type==="editContract")buildContractForm(box,m);
  else if(m.type==="pay")buildPayForm(box,m.uid);
  else if(m.type==="editPayment")buildEditPayForm(box,m.uid,m.pmt);
  return ov;
}

function mTitle(box,title){
  box.appendChild(h("div",{cls:"modal-title"},title,h("button",{cls:"close-btn",onClick:()=>set({modal:null})},"×")));
}

// Unit detail

  if(u.status==="vacant"){
    box.appendChild(h("div",{cls:"empty"},"شاغرة"));
    box.appendChild(h("button",{cls:"btn btn-green",onClick:()=>set({modal:{type:"addContract",uid:id}})},"+ إضافة عقد"));
    return;
  }
  var badgeCls=st==="late"?"bg-red":st==="expiring"?"bg-yellow":"bg-green";
  var badgeLbl=st==="late"?"متأخر":st==="expiring"?"ينتهي قريباً":"نشط";
  box.appendChild(h("div",{style:{marginBottom:"12px"}},h("span",{cls:"badge "+badgeCls},badgeLbl)));
  box.appendChild(h("div",{cls:"row"},h("span",{cls:"lbl"},"المستأجر"),h("span",{cls:"val"},u.tenant||"—")));
  box.appendChild(h("div",{cls:"row"},h("span",{cls:"lbl"},"الإيجار"),h("span",{cls:"val",style:{color:"var(--green)"}},fmt(u.rent)+" "+CUR)));
  if(ct){
    box.appendChild(h("div",{cls:"row"},h("span",{cls:"lbl"},"بداية العقد"),h("span",{},fd(ct.start))));
    box.appendChild(h("div",{cls:"row"},h("span",{cls:"lbl"},"نهاية العقد"),h("span",{},fd(ct.end))));
  }

  box.appendChild(h("div",{style:{marginTop:"12px"}}));

  else{
    box.appendChild(h("div",{cls:"alert alert-yellow"},"⏳ لم يدفع "+mkLabel(S.mk)));
    box.appendChild(h("button",{cls:"btn btn-green",onClick:()=>set({modal:{type:"pay",uid:id}})},"💰 تسجيل الإيجار"));
  }

    if(!confirm("إنهاء عقد شقة "+id+"؟"))return;

    await saveUnit(updated);set({modal:null});
  }},"🚪 إنهاء العقد"));

// Contract form
function buildContractForm(box,m){
  var id=m.uid||"";var ct=m.type==="editContract"?getActive(id):null;
  mTitle(box,m.type==="editContract"?"تعديل العقد":"عقد جديد");
  var selEl=null;
  if(!id){
    box.appendChild(h("div",{cls:"field-lbl"},"رقم الشقة"));
    selEl=h("select",{});
    selEl.appendChild(h("option",{value:""},"اختر الشقة"));
    allIds().filter(i=>!S.units[i]||S.units[i].status==="vacant").forEach(i=>selEl.appendChild(h("option",{value:i},i)));
    box.appendChild(selEl);
  } else {
    box.appendChild(h("div",{style:{fontWeight:"700",fontSize:"15px",marginBottom:"12px",color:"var(--blue)"}},"شقة "+id));
  }
  var fName=h("input",{type:"text",placeholder:"اسم المستأجر"});
  var fStart=h("input",{type:"date"});
  var fEnd=h("input",{type:"date"});
  var fRent=h("input",{type:"number",placeholder:"الإيجار الشهري"});
  if(ct){fName.value=ct.tenant||"";fStart.value=ct.start||"";fEnd.value=ct.end||"";fRent.value=ct.rent||"";}
  else if(id){var u2=getUnit(id);fName.value=u2.tenant||"";fRent.value=u2.rent||"";fStart.value=today();}

  [["اسم المستأجر *",fName],["بداية العقد *",fStart],["نهاية العقد *",fEnd],["الإيجار الشهري ("+CUR+") *",fRent]].forEach(([l,el])=>{
    box.appendChild(h("div",{cls:"field-lbl"},l));
    box.appendChild(el);
  });

  box.appendChild(h("button",{cls:"btn btn-green",onClick:async()=>{
    var finalId=id||(selEl&&selEl.value)||"";
    if(!finalId||!fName.value.trim()||!fStart.value||!fEnd.value||!fRent.value){alert("يرجى ملء جميع الحقول *");return;}
    var u={...getUnit(finalId),id:finalId,label:finalId,status:"occupied",tenant:fName.value.trim(),rent:Number(fRent.value)};
    var newCt={tenant:fName.value.trim(),start:fStart.value,end:fEnd.value,rent:Number(fRent.value),dueDay:1,payments:[],createdAt:new Date().toISOString()};
    var cs=getContracts(finalId);
    if(m.type==="editContract"&&cs.length)cs[cs.length-1]={...cs[cs.length-1],...newCt,payments:cs[cs.length-1].payments||[]};
    else cs=[...cs,newCt];
    await saveUnit(u);await saveHist(finalId,cs);set({modal:null});
  }},m.type==="editContract"?"💾 حفظ":"✅ إضافة العقد"));
}

// Pay form
function buildPayForm(box,id){
  var u=getUnit(id);
  mTitle(box,"تسجيل إيجار — شقة "+id);
  box.appendChild(h("div",{cls:"row"},h("span",{cls:"lbl"},"المستأجر"),h("span",{cls:"val"},u.tenant||"—")));
  box.appendChild(h("div",{cls:"row"},h("span",{cls:"lbl"},"الإيجار المستحق"),h("span",{style:{color:"var(--green)",fontWeight:"700"}},fmt(u.rent)+" "+CUR)));
  box.appendChild(h("div",{style:{marginBottom:"12px"}}));
  var fAmt=h("input",{type:"number",placeholder:"المبلغ",value:u.rent||""});
  var fDate=h("input",{type:"date",value:today()});
  [["المبلغ ("+CUR+")",fAmt],["تاريخ الاستلام",fDate]].forEach(([l,el])=>{box.appendChild(h("div",{cls:"field-lbl"},l));box.appendChild(el);});
  box.appendChild(h("button",{cls:"btn btn-green",onClick:async()=>{
    if(!fAmt.value||!fDate.value){alert("يرجى ملء الحقول");return;}

  }},"✅ تأكيد الاستلام"));
}

// ─── REPORT ───
function rReport(){

  var selYear=S.reportYear||now.getFullYear();
  var selMonth=S.reportMonth||null; // null = عرض السنة، رقم = عرض الشهر

  // Year selector
  var ys=h("div",{style:{display:"flex",gap:"8px",marginBottom:"12px",alignItems:"center"}});
  ys.appendChild(h("button",{cls:"btn btn-gray btn-sm",onClick:()=>set({reportYear:selYear-1,reportMonth:null})},"◀"));
  ys.appendChild(h("div",{style:{flex:"1",textAlign:"center",fontWeight:"800",fontSize:"17px"}},String(selYear)));
  ys.appendChild(h("button",{cls:"btn btn-gray btn-sm",onClick:()=>set({reportYear:selYear+1,reportMonth:null})},"▶"));
  w.appendChild(ys);

  // جمع بيانات كل الوحدات
  var allUnits=Object.values(S.units).filter(function(u){
    return u.status!=="vacant"&&u.tenant!=="مكتب البناية"&&u.id!=="25";
  });

  // حساب بيانات كل شهر
  var monthlyData=[];
  var totalCollected=0,totalExpected=0;

  for(var m=1;m<=12;m++){
    var mk=selYear+"-"+pad(m);
    var mStart=new Date(selYear,m-1,1);
    var mEnd=new Date(selYear,m,0);
    var units=[];
    allUnits.forEach(function(u){
      var ct=getActive(u.id);
      if(!ct) return;
      var cStart=ct.start?new Date(ct.start):null;
      var cEnd=ct.end?new Date(ct.end):null;
      if(cStart&&cEnd&&(cStart>mEnd||cEnd<mStart)) return;
      var pmt=(ct.payments||[]).find(function(p){return p.mk===mk&&p.status==="paid";});
      units.push({u,ct,pmt,paid:!!pmt,amount:pmt?pmt.amount:0});
    });
    var mCollected=units.filter(function(x){return x.paid;}).reduce(function(s,x){return s+x.amount;},0);
    var mExpected=units.reduce(function(s,x){return s+(x.u.rent||0);},0);
    monthlyData.push({m,mk,label:MONTHS[m-1],units,collected:mCollected,expected:mExpected});
    totalCollected+=mCollected;
    totalExpected+=mExpected;
  }

  // إذا اختار شهر معين — عرض تفصيلي
  if(selMonth){
    var md=monthlyData[selMonth-1];
    var pct=md.expected>0?Math.round(md.collected/md.expected*100):0;

    // header
    w.appendChild(h("div",{style:{display:"flex",gap:"8px",marginBottom:"12px",alignItems:"center"}},
      h("button",{cls:"btn btn-gray btn-sm",onClick:()=>set({reportMonth:null})},"↩ السنة"),
      h("div",{style:{flex:"1",textAlign:"center",fontWeight:"800",fontSize:"16px"}},md.label+" "+selYear)
    ));

    // ملخص الشهر
    w.appendChild(h("div",{cls:"stat-grid"},
      h("div",{cls:"stat-box"},h("div",{cls:"num",style:{color:"var(--green)"}},fmt(md.collected)),h("div",{cls:"lbl2"},"محصّل "+CUR)),
      h("div",{cls:"stat-box"},h("div",{cls:"num",style:{color:"var(--red)"}},fmt(md.expected-md.collected)),h("div",{cls:"lbl2"},"متبقي "+CUR)),
      h("div",{cls:"stat-box"},h("div",{cls:"num",style:{color:"var(--green)"}},String(md.units.filter(function(x){return x.paid;}).length)),h("div",{cls:"lbl2"},"دفع")),
      h("div",{cls:"stat-box"},h("div",{cls:"num",style:{color:"var(--red)"}},String(md.units.filter(function(x){return !x.paid;}).length)),h("div",{cls:"lbl2"},"لم يدفع"))
    ));

    // الشقق
    var aptsUnits=md.units.filter(function(x){return !x.u.id.startsWith("م");});
    var shopsUnits=md.units.filter(function(x){return x.u.id.startsWith("م");});

    if(aptsUnits.length){
      w.appendChild(h("div",{style:{fontWeight:"800",fontSize:"13px",color:"var(--muted)",margin:"10px 0 6px"}},"🏠 الشقق ("+aptsUnits.length+")"));
      aptsUnits.sort(function(a,b){return a.u.id.localeCompare(b.u.id,undefined,{numeric:true});}).forEach(function(x){
        var row=h("div",{cls:"card",style:{padding:"10px 12px",marginBottom:"6px",borderRight:"3px solid "+(x.paid?"var(--green)":"var(--red)")}});
        row.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h("div",{},
            h("span",{style:{fontWeight:"800",fontSize:"14px"}},"شقة "+x.u.id),
            h("span",{style:{color:"var(--muted)",fontSize:"12px",marginRight:"8px"}},x.u.tenant)
          ),
          h("div",{style:{textAlign:"left"}},
            h("div",{style:{color:x.paid?"var(--green)":"var(--red)",fontWeight:"700",fontSize:"13px"}},x.paid?fmt(x.amount)+" "+CUR:"لم يدفع"),
            x.paid?h("div",{style:{color:"var(--muted)",fontSize:"11px"}},fd(x.pmt.date))
              :h("div",{style:{color:"var(--muted)",fontSize:"11px"}},fmt(x.u.rent)+" "+CUR+" مستحق")
          )
        ));
        w.appendChild(row);
      });
    }

    if(shopsUnits.length){
      w.appendChild(h("div",{style:{fontWeight:"800",fontSize:"13px",color:"var(--muted)",margin:"10px 0 6px"}},"🏪 المحلات ("+shopsUnits.length+")"));
      shopsUnits.forEach(function(x){
        var row=h("div",{cls:"card",style:{padding:"10px 12px",marginBottom:"6px",borderRight:"3px solid "+(x.paid?"var(--green)":"var(--red)")}});
        row.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h("div",{},
            h("span",{style:{fontWeight:"800",fontSize:"14px"}},x.u.id),
            h("span",{style:{color:"var(--muted)",fontSize:"11px",marginRight:"8px"}},x.u.tenant)
          ),
          h("div",{style:{textAlign:"left"}},
            h("div",{style:{color:x.paid?"var(--green)":"var(--red)",fontWeight:"700",fontSize:"13px"}},x.paid?fmt(x.amount)+" "+CUR:"لم يدفع"),
            x.paid?h("div",{style:{color:"var(--muted)",fontSize:"11px"}},fd(x.pmt.date))
              :h("div",{style:{color:"var(--muted)",fontSize:"11px"}},fmt(x.u.rent)+" "+CUR+" مستحق")
          )
        ));
        w.appendChild(row);
      });
    }

    // طباعة الشهر
    w.appendChild(h("button",{cls:"btn btn-gray",style:{marginTop:"10px"},onClick:function(){
      var rows=md.units.sort(function(a,b){return a.u.id.localeCompare(b.u.id,undefined,{numeric:true});}).map(function(x){
        return "<tr style='background:"+(x.paid?"#f0fff4":"#fff5f5")+"'><td>"+(x.u.id.startsWith("م")?"محل "+x.u.id:"شقة "+x.u.id)+"</td><td>"+x.u.tenant+"</td><td>"+fmt(x.u.rent)+"</td><td style='color:"+(x.paid?"green":"red")+"'>"+(x.paid?fmt(x.amount)+" ✅":"لم يدفع ❌")+"</td><td>"+(x.pmt?fd(x.pmt.date):"—")+"</td></tr>";
      }).join("");
      var pw=window.open("","_blank");
      pw.document.write("<!DOCTYPE html><html dir='rtl'><head><meta charset='UTF-8'><link href='https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap' rel='stylesheet'><style>body{font-family:Tajawal,Arial,sans-serif;padding:20px;direction:rtl;font-size:13px}h2{text-align:center;margin-bottom:4px}h3{text-align:center;color:#666;margin-bottom:14px;font-weight:400}table{width:100%;border-collapse:collapse}th{background:#1a1a1a;color:#fff;padding:8px;font-size:13px}td{border:1px solid #ddd;padding:7px 9px}tfoot td{font-weight:800;background:#f0f0f0;font-size:14px}@media print{button{display:none}}</style></head><body><h2>🏢 تقرير "+md.label+" "+selYear+"</h2><h3>إجمالي المحصّل: "+fmt(md.collected)+" — المتبقي: "+fmt(md.expected-md.collected)+" "+CUR+"</h3><table><thead><tr><th>الوحدة</th><th>المستأجر</th><th>الإيجار</th><th>حالة الدفع</th><th>تاريخ الدفع</th></tr></thead><tbody>"+rows+"</tbody><tfoot><tr><td colspan='2'>الإجمالي</td><td>"+fmt(md.expected)+"</td><td style='color:green'>"+fmt(md.collected)+" "+CUR+"</td><td></td></tr></tfoot></table><br><div style='text-align:center'><button onclick='window.print()' style='padding:10px 28px;font-size:14px;cursor:pointer;background:#333;color:#fff;border:none;border-radius:6px'>🖨️ طباعة</button></div></body></html>");
      pw.document.close();
    }},"🖨️ طباعة تقرير "+md.label));

    return w;
  }

  // عرض السنة — ملخص كل شهر
  w.appendChild(h("div",{cls:"stat-grid"},
    h("div",{cls:"stat-box"},h("div",{cls:"num",style:{color:"var(--green)"}},fmt(totalCollected)),h("div",{cls:"lbl2"},"إجمالي المحصّل "+CUR)),
    h("div",{cls:"stat-box"},h("div",{cls:"num",style:{color:"var(--red)"}},fmt(totalExpected-totalCollected)),h("div",{cls:"lbl2"},"إجمالي المتبقي "+CUR)),
    h("div",{cls:"stat-box"},h("div",{cls:"num",style:{color:"var(--blue)"}},fmt(totalExpected)),h("div",{cls:"lbl2"},"المتوقع للسنة "+CUR)),
    h("div",{cls:"stat-box"},h("div",{cls:"num"},totalExpected>0?Math.round(totalCollected/totalExpected*100)+"%":"0%"),h("div",{cls:"lbl2"},"نسبة التحصيل"))
  ));

  w.appendChild(h("div",{style:{fontSize:"12px",color:"var(--muted)",marginBottom:"10px"}},"اضغط على الشهر لعرض التفاصيل"));

  monthlyData.forEach(function(md){
    var pct=md.expected>0?Math.round(md.collected/md.expected*100):0;
    var card=h("div",{cls:"card",style:{padding:"12px 14px",marginBottom:"8px",cursor:"pointer"},onClick:(function(mm){return function(){set({reportMonth:mm});};})(md.m)});
    card.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}},
      h("div",{style:{fontWeight:"800",fontSize:"14px"}},md.label),
      h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}},
        h("span",{style:{fontSize:"12px",color:pct>=100?"var(--green)":pct>0?"var(--yellow)":"var(--muted)"}},pct+"%"),
        h("span",{style:{fontSize:"11px",color:"var(--muted)"}},"←")
      )
    ));
    var pb=h("div",{style:{background:"#222",borderRadius:"99px",height:"5px",overflow:"hidden",marginBottom:"7px"}});
    pb.appendChild(h("div",{style:{height:"100%",borderRadius:"99px",width:Math.min(pct,100)+"%",background:pct>=100?"var(--green)":pct>0?"var(--yellow)":"#333"}}));
    card.appendChild(pb);
    card.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"12px"}},
      h("span",{style:{color:"var(--green)"}},fmt(md.collected)+" "+CUR),
      h("span",{style:{color:"var(--muted)"}},md.units.filter(function(x){return x.paid;}).length+"/"+md.units.length+" دفعوا"),
      h("span",{style:{color:"var(--red)"}},md.collected<md.expected?"-"+fmt(md.expected-md.collected)+" "+CUR:"✅")
    ));
    w.appendChild(card);
  });

  // طباعة السنة كاملة
  w.appendChild(h("button",{cls:"btn btn-gray",style:{marginTop:"8px"},onClick:function(){
    var allRows="";
    monthlyData.forEach(function(md){
      var pct=md.expected>0?Math.round(md.collected/md.expected*100):0;
      allRows+="<tr><td><b>"+md.label+"</b></td><td>"+fmt(md.expected)+"</td><td style='color:green'>"+fmt(md.collected)+"</td><td style='color:red'>"+fmt(md.expected-md.collected)+"</td><td>"+pct+"%</td><td>"+md.units.filter(function(x){return x.paid;}).length+"/"+md.units.length+"</td></tr>";
      md.units.filter(function(x){return x.paid;}).sort(function(a,b){return a.u.id.localeCompare(b.u.id,undefined,{numeric:true});}).forEach(function(x){
        allRows+="<tr style='background:#f9f9f9;font-size:12px'><td style='padding-right:20px'>— "+(x.u.id.startsWith("م")?"محل "+x.u.id:"شقة "+x.u.id)+" ("+x.u.tenant+")</td><td></td><td style='color:green'>"+fmt(x.amount)+"</td><td></td><td></td><td>"+fd(x.pmt.date)+"</td></tr>";
      });
    });
    var pw=window.open("","_blank");
    pw.document.write("<!DOCTYPE html><html dir='rtl'><head><meta charset='UTF-8'><link href='https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap' rel='stylesheet'><style>body{font-family:Tajawal,Arial,sans-serif;padding:20px;direction:rtl;font-size:13px}h2{text-align:center;margin-bottom:14px}table{width:100%;border-collapse:collapse}th{background:#1a1a1a;color:#fff;padding:8px;font-size:13px}td{border:1px solid #ddd;padding:6px 8px}tfoot td{font-weight:800;background:#f0f0f0}@media print{button{display:none}}</style></head><body><h2>🏢 التقرير السنوي — "+selYear+"</h2><table><thead><tr><th>الشهر / الوحدة</th><th>المتوقع</th><th>المحصّل</th><th>المتبقي</th><th>نسبة التحصيل</th><th>عدد الدافعين</th></tr></thead><tbody>"+allRows+"</tbody><tfoot><tr><td>الإجمالي</td><td>"+fmt(totalExpected)+"</td><td style='color:green'>"+fmt(totalCollected)+"</td><td style='color:red'>"+fmt(totalExpected-totalCollected)+"</td><td>"+(totalExpected>0?Math.round(totalCollected/totalExpected*100):0)+"%</td><td></td></tr></tfoot></table><br><div style='text-align:center'><button onclick='window.print()' style='padding:10px 28px;font-size:14px;cursor:pointer;background:#333;color:#fff;border:none;border-radius:6px'>🖨️ طباعة</button></div></body></html>");
    pw.document.close();
  }},"🖨️ طباعة التقرير السنوي"));

  return w;
}

// Edit payment form
function buildEditPayForm(box,uid,pmt){
  var u=getUnit(uid);
  mTitle(box,"تعديل دفعة — "+(uid.startsWith("م")?"محل ":"شقة ")+uid);
  box.appendChild(h("div",{style:{color:"var(--muted)",fontSize:"13px",marginBottom:"12px"}},u.tenant||"—"));
  var fAmt=h("input",{type:"number",value:pmt.amount||""});
  var fDate=h("input",{type:"date",value:pmt.date||today()});
  var fMethod=h("select",{},
    h("option",{value:"نقداً"},"نقداً"),
    h("option",{value:"تحويل بنكي"},"تحويل بنكي"),
    h("option",{value:"بطاقة"},"بطاقة")
  );
  if(pmt.method)fMethod.value=pmt.method;
  [["المبلغ ("+CUR+")",fAmt],["تاريخ الاستلام",fDate],["طريقة الدفع",fMethod]].forEach(function(arr){
    box.appendChild(h("div",{cls:"field-lbl"},arr[0]));
    box.appendChild(arr[1]);
  });
  box.appendChild(h("button",{cls:"btn btn-green",onClick:async function(){
    if(!fAmt.value||!fDate.value){alert("يرجى ملء الحقول");return;}
    var cs=getContracts(uid);
    if(!cs.length)return;
    var pmts=cs[cs.length-1].payments||[];
    var idx=pmts.findIndex(function(x){return x.id===pmt.id;});
    if(idx>=0){
      pmts[idx]={...pmts[idx],amount:Number(fAmt.value),date:fDate.value,method:fMethod.value};
      cs[cs.length-1].payments=pmts;
      await saveHist(uid,cs);
    }
    set({modal:null});
  }},"💾 حفظ التعديل"));
}

loadData();
</script>
